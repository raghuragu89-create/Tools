  type: android
  adb_host: true
  hostname: ''
  mac_address: ''
  jenkins_node: krq-android-nft-0
- name: Android Perf-1
  ip: 10.0.0.2
  type: android
  adb_host: true
  hostname: ''
  mac_address: ''
