ssh:
  username: your-ssh-user
  key_path: ~/.ssh/lab_key
  password: 'YOUR_SSH_PASSWORD'
  timeout: 10
acme:
  endpoint_template: http://{ip}:8080/acme/status
  timeout: 5
jenkins:
  url: https://jenkins.example.com
  username: ''
  api_token: ''
  timeout: 10
  monitor_jobs:
  - Android-NFT-Release
  - iOS-NFT-Release
  - Pegasus-3P
restart:
  enabled: true
  day: tuesday
  time: 02:00
  reboot_hosts: false
  wait_after_reboot: 45
thresholds:
  battery_min_percent: 80
  macos_target_version: 15.7.7
  fos_serial_pattern: ^(B0|G0|A0)
discovery:
  enabled: true
  subnet: 10.0.0
  update_config: true
adb:
  binary: adb
  remote_port: 5037
